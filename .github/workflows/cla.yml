name: CLA Assistant

# Manages Contributor License Agreement signatures via PR comments.
# Stores signatures in the cla-signatures branch and comments on PRs.
# Engagement Level: T3 (Peer Programmer) — writes CLA signature files and PR comments.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  cla:
    name: CLA Assistant
    runs-on: ubuntu-latest
    # Skip CLA for internal staging→main promotion PRs; only gate external contributors.
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA.') ||
      (github.event_name == 'pull_request_target' && github.event.action != 'closed' && github.head_ref != 'staging')
    steps:
      - name: Generate GitHub App Token
        if: ${{ secrets.GH_CE_APP_ID != '' && secrets.GH_CE_APP_PRIVATE_KEY != '' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_CE_APP_ID }}
          private-key: ${{ secrets.GH_CE_APP_PRIVATE_KEY }}

      - name: Resolve CLA auth token
        id: cla-token
        shell: bash
        run: |
          if [[ -n "${{ steps.app-token.outputs.token }}" ]]; then
            echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
          fi

      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ steps.cla-token.outputs.token }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/AgentCraftworks/AgentCraftworks-CE/blob/main/.github/CLA.md"
          branch: "cla-signatures"
          allowlist: bot*,dependabot[bot],github-actions[bot],Jenp-AICraftWorks
          create-file-commit-message: "chore: store CLA signatures"
          signed-commit-message: "chore: CLA signed by @$contributorName"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, please sign our [Contributor License Agreement](.github/CLA.md).

            To sign, add a comment to this PR with the following text:

            > I have read the CLA Document and I hereby sign the CLA.

            You only need to sign once.
