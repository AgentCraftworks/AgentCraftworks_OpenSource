name: Deploy to Production

# Engagement Level: T4 (Agent Team) — deploys to production Azure environment.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
  TYPESCRIPT_IMAGE_NAME: typescript-api
  AZD_SERVICE_NAME: typescript-api

jobs:
  build-and-deploy-typescript:
    name: Build & Deploy TypeScript Service
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          REF_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAGS="${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.TYPESCRIPT_IMAGE_NAME }}:${REF_NAME} ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.TYPESCRIPT_IMAGE_NAME }}:sha-${SHA_SHORT}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "version=${REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push with ACR
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry ${{ secrets.AZURE_ACR_NAME }} \
              --image ${{ env.TYPESCRIPT_IMAGE_NAME }}:${{ steps.meta.outputs.version }} \
              --image ${{ env.TYPESCRIPT_IMAGE_NAME }}:sha-$(echo "${{ github.sha }}" | cut -c1-7) \
              --file ./typescript/Dockerfile \
              ./typescript

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.TYPESCRIPT_IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  smoke-tests:
    name: Run Smoke Tests
    needs: build-and-deploy-typescript
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve app URL from Azure resource metadata
        # Primary: query the Container App whose azd-service-name tag equals
        # AZD_SERVICE_NAME inside the deployment resource group.
        # Fallback: use the TYPESCRIPT_PROD_URL secret if tag lookup yields nothing.
        id: resolve-url
        run: |
          LOOKUP_STDERR=$(mktemp)
          FQDN=$(az containerapp list \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "[?tags.\"azd-service-name\"=='${{ env.AZD_SERVICE_NAME }}'].properties.configuration.ingress.fqdn | [0]" \
            --output tsv 2>"$LOOKUP_STDERR" || true)
          if [ -n "$FQDN" ]; then
            APP_URL="https://${FQDN}"
            echo "discovery_path=azure-tag-lookup" >> "$GITHUB_OUTPUT"
          else
            if [ -s "$LOOKUP_STDERR" ]; then
              echo "⚠️ Azure tag lookup failed with error:" >&2
              cat "$LOOKUP_STDERR" >&2
            fi
            APP_URL="${{ secrets.TYPESCRIPT_PROD_URL }}"
            echo "discovery_path=secret-fallback" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$LOOKUP_STDERR"
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Validate app URL is non-empty
        run: |
          APP_URL="${{ steps.resolve-url.outputs.app_url }}"
          DISCOVERY_PATH="${{ steps.resolve-url.outputs.discovery_path }}"
          if [ -z "$APP_URL" ]; then
            echo "❌ BASE_URL could not be resolved (discovery_path=${DISCOVERY_PATH})."
            echo "   Fix: ensure the azd-service-name='${{ env.AZD_SERVICE_NAME }}' tag exists on the Container App"
            echo "   or set the TYPESCRIPT_PROD_URL environment secret as a fallback."
            exit 1
          fi
          echo "✅ BASE_URL resolved via ${DISCOVERY_PATH}: ${APP_URL}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript smoke tests
        env:
          BASE_URL: ${{ steps.resolve-url.outputs.app_url }}
        run: npx -w typescript tsx smoke-test.ts

      - name: Notify on success
        if: success()
        run: echo "✅ All smoke tests passed in production!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Smoke tests failed in production!"
          exit 1
