name: Deploy to Production

# Deploys the TypeScript service to the production Azure Container Apps environment.
# Triggered on version tags or manual dispatch.
# Engagement Level: T4 (Agent Team) — deploys to production Azure environment.
# Prerequisite: run deploy-azd.yml first and sync its job-summary outputs to the
# 'production' environment secrets (AZURE_ACR_NAME, AZURE_ACR_LOGIN_SERVER,
# AZURE_RESOURCE_GROUP, AZURE_CONTAINER_APP_NAME, TYPESCRIPT_PROD_URL).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  TYPESCRIPT_IMAGE_NAME: typescript-api
  AZD_SERVICE_NAME: typescript-api

jobs:
  build-and-deploy-typescript:
    name: Build & Deploy TypeScript Service
    runs-on: ubuntu-latest
    environment: production
    outputs:
      app_url: ${{ steps.resolve.outputs.app_url }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Preflight — verify required secrets
        env:
          AZURE_ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
          AZURE_ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          TYPESCRIPT_PROD_URL: ${{ secrets.TYPESCRIPT_PROD_URL }}
        run: |
          MISSING=()
          [ -z "$AZURE_ACR_NAME" ]           && MISSING+=("AZURE_ACR_NAME")
          [ -z "$AZURE_ACR_LOGIN_SERVER" ]   && MISSING+=("AZURE_ACR_LOGIN_SERVER")
          [ -z "$AZURE_RESOURCE_GROUP" ]     && MISSING+=("AZURE_RESOURCE_GROUP")
          [ -z "$AZURE_CONTAINER_APP_NAME" ] && MISSING+=("AZURE_CONTAINER_APP_NAME")
          [ -z "$TYPESCRIPT_PROD_URL" ]      && MISSING+=("TYPESCRIPT_PROD_URL")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required production secrets: ${MISSING[*]}"
            echo "::notice::Run deploy-azd.yml (action: 'up (provision + deploy)', environment: production)"
            echo "::notice::and sync the job-summary outputs to the 'production' environment secrets."
            echo "::notice::See DEPLOYMENT.md for step-by-step instructions."
            exit 1
          fi
          echo "✅ All required secrets are present."

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment settings
        id: resolve
        shell: bash
        env:
          ACR_NAME_SECRET: ${{ secrets.AZURE_ACR_NAME }}
          ACR_LOGIN_SERVER_SECRET: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          APP_NAME_SECRET: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          RG_NAME_SECRET: ${{ secrets.AZURE_RESOURCE_GROUP }}
          APP_URL_SECRET: ${{ secrets.TYPESCRIPT_PROD_URL }}
        run: |
          set -euo pipefail

          if [ -z "$RG_NAME_SECRET" ]; then
            echo "::error::AZURE_RESOURCE_GROUP secret is required."
            exit 1
          fi

          ACR_NAME="$ACR_NAME_SECRET"
          if [ -z "$ACR_NAME" ]; then
            ACR_NAME=$(az acr list --resource-group "$RG_NAME_SECRET" --query "[0].name" -o tsv)
          fi
          if [ -z "$ACR_NAME" ]; then
            echo "::error::Could not resolve Azure Container Registry name."
            exit 1
          fi

          ACR_LOGIN_SERVER="$ACR_LOGIN_SERVER_SECRET"
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query "loginServer" -o tsv)
          fi
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "::error::Could not resolve Azure Container Registry login server."
            exit 1
          fi

          APP_URL="$APP_URL_SECRET"
          if [ -z "$APP_URL" ]; then
            APP_NAME="$APP_NAME_SECRET"
            if [ -z "$APP_NAME" ]; then
              APP_NAME=$(az resource list \
                --resource-group "$RG_NAME_SECRET" \
                --resource-type "Microsoft.App/containerApps" \
                --query "[?tags.\"azd-service-name\"=='typescript-api'].name | [0]" \
                -o tsv)
            fi

            if [ -n "$APP_NAME" ]; then
              APP_FQDN=$(az containerapp show --name "$APP_NAME" --resource-group "$RG_NAME_SECRET" --query "properties.configuration.ingress.fqdn" -o tsv)
              if [ -n "$APP_FQDN" ]; then
                APP_URL="https://$APP_FQDN"
              fi
            fi
          fi

          if [ -z "$APP_URL" ]; then
            echo "::error::Could not resolve production app URL for smoke tests."
            exit 1
          fi

          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          REF_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAGS="${{ steps.resolve.outputs.acr_login_server }}/${{ env.TYPESCRIPT_IMAGE_NAME }}:${REF_NAME} ${{ steps.resolve.outputs.acr_login_server }}/${{ env.TYPESCRIPT_IMAGE_NAME }}:sha-${SHA_SHORT}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "version=${REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push with ACR
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry ${{ steps.resolve.outputs.acr_name }} \
              --image ${{ env.TYPESCRIPT_IMAGE_NAME }}:${{ steps.meta.outputs.version }} \
              --image ${{ env.TYPESCRIPT_IMAGE_NAME }}:sha-$(echo "${{ github.sha }}" | cut -c1-7) \
              --file ./typescript/Dockerfile \
              ./typescript

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ steps.resolve.outputs.acr_login_server }}/${{ env.TYPESCRIPT_IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  smoke-tests:
    name: Run Smoke Tests
    needs: build-and-deploy-typescript
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve app URL from Azure resource metadata
        # Primary: query the Container App whose azd-service-name tag equals
        # AZD_SERVICE_NAME inside the deployment resource group.
        # Fallback: use the TYPESCRIPT_PROD_URL secret if tag lookup yields nothing.
        id: resolve-url
        run: |
          LOOKUP_STDERR=$(mktemp)
          FQDN=$(az containerapp list \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "[?tags.\"azd-service-name\"=='${{ env.AZD_SERVICE_NAME }}'].properties.configuration.ingress.fqdn | [0]" \
            --output tsv 2>"$LOOKUP_STDERR" || true)
          if [ -n "$FQDN" ]; then
            APP_URL="https://${FQDN}"
            echo "discovery_path=azure-tag-lookup" >> "$GITHUB_OUTPUT"
          else
            if [ -s "$LOOKUP_STDERR" ]; then
              echo "⚠️ Azure tag lookup failed with error:" >&2
              cat "$LOOKUP_STDERR" >&2
            fi
            APP_URL="${{ secrets.TYPESCRIPT_PROD_URL }}"
            echo "discovery_path=secret-fallback" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$LOOKUP_STDERR"
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Validate app URL is non-empty
        run: |
          APP_URL="${{ steps.resolve-url.outputs.app_url }}"
          DISCOVERY_PATH="${{ steps.resolve-url.outputs.discovery_path }}"
          if [ -z "$APP_URL" ]; then
            echo "❌ BASE_URL could not be resolved (discovery_path=${DISCOVERY_PATH})."
            echo "   Fix: ensure the azd-service-name='${{ env.AZD_SERVICE_NAME }}' tag exists on the Container App"
            echo "   or set the TYPESCRIPT_PROD_URL environment secret as a fallback."
            exit 1
          fi
          echo "✅ BASE_URL resolved via ${DISCOVERY_PATH}: ${APP_URL}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript smoke tests
        env:
          BASE_URL: ${{ steps.resolve-url.outputs.app_url }}
        run: npx -w typescript tsx smoke-test.ts

      - name: Notify on success
        if: success()
        run: echo "✅ All smoke tests passed in production!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Smoke tests failed in production!"
          exit 1
