name: "GH-AW: Code Simplifier"

# Code Simplifier — Analyzes recently modified code and creates PRs with simplifications.
# Improves clarity, consistency, and maintainability while preserving functionality.
# Runs daily, analyzes last 24 hours of changes.
# Engagement Level: T3 (Peer Programmer) — creates PRs with code improvements.
# Source: githubnext/agentics/workflows/code-simplifier.md

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  simplify-code:
    name: Simplify Recent Code
    runs-on: ${{ vars.RUNNER_MODE == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check GH-AW config
        id: ghaw-config
        run: |
          CONFIG=".github/ghaw-config.json"
          WORKFLOW_ID="ghaw-code-simplifier"
          if [ -f "$CONFIG" ]; then
            ENABLED=$(jq -r --arg id "$WORKFLOW_ID" '.workflows[] | select(.id == $id) | .enabled' "$CONFIG")
            if [ "$ENABLED" = "false" ]; then
              echo "::notice::Workflow $WORKFLOW_ID is disabled via ghaw-config.json — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check for existing PR
        if: steps.ghaw-config.outputs.skip != 'true'
        id: check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --search "[code-simplifier]" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "::notice::Existing code-simplifier PR found — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.ghaw-config.outputs.skip != 'true' && steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: ${{ vars.RUNNER_MODE != 'self-hosted' && 'npm' || '' }}
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        if: steps.ghaw-config.outputs.skip != 'true' && steps.check-pr.outputs.skip != 'true'
        working-directory: typescript
        run: npm ci

      - name: Simplify code and create PR
        if: steps.ghaw-config.outputs.skip != 'true' && steps.check-pr.outputs.skip != 'true'
        working-directory: typescript
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: npx tsx src/jobs/code-simplifier.ts
