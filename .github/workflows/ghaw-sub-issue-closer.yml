name: "GH-AW: Sub-Issue Closer"

# Sub-Issue Closer — Automatically closes parent issues when all sub-issues complete.
# Recursively processes GitHub issues and closes parents at 100% completion.
# Engagement Level: T3 (Peer Programmer) — closes issues and adds comments.
# Source: githubnext/agentics/workflows/sub-issue-closer.md

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  close-completed:
    name: Close Completed Parent Issues
    runs-on: ${{ vars.RUNNER_MODE == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check GH-AW config
        id: ghaw-config
        run: |
          CONFIG=".github/ghaw-config.json"
          WORKFLOW_ID="ghaw-sub-issue-closer"
          if [ -f "$CONFIG" ]; then
            ENABLED=$(jq -r --arg id "$WORKFLOW_ID" '.workflows[] | select(.id == $id) | .enabled' "$CONFIG")
            if [ "$ENABLED" = "false" ]; then
              echo "::notice::Workflow $WORKFLOW_ID is disabled via ghaw-config.json — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.ghaw-config.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: ${{ vars.RUNNER_MODE != 'self-hosted' && 'npm' || '' }}
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        if: steps.ghaw-config.outputs.skip != 'true'
        working-directory: typescript
        run: npm ci

      - name: Close completed parent issues
        if: steps.ghaw-config.outputs.skip != 'true'
        working-directory: typescript
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: npx tsx src/jobs/sub-issue-closer.ts
