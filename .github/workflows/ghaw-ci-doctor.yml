name: "GH-AW: CI Doctor"

# CI Doctor — Investigates CI failures and creates detailed diagnostic issues.
# Triggered when monitored workflows fail. Analyzes logs, identifies root causes,
# and provides actionable remediation steps.
# Engagement Level: T2 (Advisor) — creates issues with analysis, no code modifications.
# Source: githubnext/agentics/workflows/ci-doctor.md

on:
  workflow_run:
    workflows: ["TypeScript CI"]
    types: [completed]
    branches: [main, staging]

  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID to investigate"
        required: false
        type: string

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  investigate-failure:
    name: Investigate CI Failure
    runs-on: ${{ vars.RUNNER_MODE == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check GH-AW config
        id: ghaw-config
        run: |
          CONFIG=".github/ghaw-config.json"
          WORKFLOW_ID="ghaw-ci-doctor"
          if [ -f "$CONFIG" ]; then
            ENABLED=$(jq -r --arg id "$WORKFLOW_ID" '.workflows[] | select(.id == $id) | .enabled' "$CONFIG")
            if [ "$ENABLED" = "false" ]; then
              echo "::notice::Workflow $WORKFLOW_ID is disabled via ghaw-config.json — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.ghaw-config.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: ${{ vars.RUNNER_MODE != 'self-hosted' && 'npm' || '' }}
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        if: steps.ghaw-config.outputs.skip != 'true'
        working-directory: typescript
        run: npm ci

      - name: Investigate failure and create issue
        if: steps.ghaw-config.outputs.skip != 'true'
        working-directory: typescript
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: npx tsx src/jobs/ci-doctor.ts
